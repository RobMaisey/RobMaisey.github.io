<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkFit Templates: Time Travel</title>
<meta name="description" content="An interactive session tool mapping how the brain processes past, present, and future. By Rob Maisey, WorkFit.">
<meta property="og:title" content="WorkFit Templates: Time Travel">
<meta property="og:description" content="An interactive session tool mapping how the brain processes past, present, and future.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://sharezen.ca/workfit/time-travel">
<meta name="author" content="Rob Maisey, ShareZen Consulting">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0e0e10;
    --surface: #18181b;
    --surface-hover: #1f1f23;
    --border: #2a2a2e;
    --text-primary: #f0f0f2;
    --text-secondary: #c4c4cc;
    --text-tertiary: #7a7a88;
    --past: #a194f0;
    --past-bg: rgba(161,148,240,0.10);
    --present: #f06b6a;
    --present-bg: rgba(240,107,106,0.10);
    --future: #3cd9a0;
    --future-bg: rgba(60,217,160,0.10);
    --accent: #f06b6a;
  }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    user-select: none;
    -webkit-user-select: none;
    cursor: default;
  }

  /* ─── INDEX SCREEN ─── */
  #index-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  #index-screen.hidden {
    opacity: 0;
    transform: scale(0.96);
    pointer-events: none;
  }
  .index-title {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 4px;
    color: var(--text-tertiary);
    margin-bottom: 48px;
    text-transform: uppercase;
  }
  .index-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 300px));
    gap: 20px;
    max-width: 960px;
    padding: 0 32px;
    justify-content: center;
  }
  .index-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 32px 28px;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }
  .index-card:hover {
    background: var(--surface-hover);
    border-color: var(--accent);
    transform: translateY(-2px);
  }
  .index-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.25s;
  }
  .index-card:hover::before { opacity: 1; }
  .index-card-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text-tertiary);
    margin-bottom: 14px;
    letter-spacing: 1px;
  }
  .index-card-title {
    font-size: 22px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 8px;
  }
  .index-card-sub {
    font-size: 15px;
    color: var(--text-secondary);
  }
  .index-card-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text-tertiary);
    margin-top: 18px;
  }

  /* ─── PRESENTATION AREA ─── */
  #presentation {
    position: fixed;
    inset: 0;
    display: none;
  }
  #presentation.active { display: block; }

  .slide-track {
    display: flex;
    height: 100vh;
    transition: transform 0.45s cubic-bezier(0.25, 0.1, 0.25, 1);
  }
  .slide {
    min-width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 48px 80px;
    position: relative;
  }

  /* Slide header */
  .slide-header {
    text-align: center;
    margin-bottom: 24px;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.5s ease;
  }
  .slide-header.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .slide-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--text-tertiary);
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .slide-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text-primary);
  }
  .slide-subtitle {
    font-size: 16px;
    color: var(--text-secondary);
    margin-top: 4px;
  }
  .slide-tagline {
    font-size: 15px;
    font-style: italic;
    color: var(--text-tertiary);
    margin-top: 10px;
    letter-spacing: 0.3px;
  }

  /* Grid table - fills available space */
  .grid-table {
    width: 100%;
    max-width: 1100px;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  /* Direction arrows row */
  .direction-row {
    display: grid;
    grid-template-columns: 180px 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.4s ease;
  }
  .direction-row.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .direction-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 1.5px;
    color: var(--text-tertiary);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .direction-label.left { justify-content: flex-end; }
  .direction-label.right { justify-content: flex-start; }
  .arrow-line {
    flex: 1;
    height: 1px;
    background: var(--text-tertiary);
    max-width: 80px;
  }

  /* Column headers */
  .col-headers {
    display: grid;
    grid-template-columns: 180px 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 8px;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.4s ease;
  }
  .col-headers.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .col-header {
    padding: 16px;
    border-radius: 6px;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    text-align: center;
  }
  .col-header.theme {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--text-secondary);
  }
  .col-header.past {
    background: var(--past-bg);
    border: 1px solid rgba(161,148,240,0.25);
    color: var(--past);
  }
  .col-header.present {
    background: var(--present-bg);
    border: 1px solid rgba(240,107,106,0.25);
    color: var(--present);
  }
  .col-header.future {
    background: var(--future-bg);
    border: 1px solid rgba(60,217,160,0.25);
    color: var(--future);
  }

  /* Data rows */
  .data-row {
    display: grid;
    grid-template-columns: 180px 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 6px;
    opacity: 0;
    transform: translateY(12px);
    transition: all 0.45s ease;
  }
  .data-row.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .cell {
    padding: 18px 16px;
    border-radius: 5px;
    font-size: 18px;
    font-weight: 500;
    text-align: center;
    transition: background 0.3s ease;
  }
  .cell.theme {
    background: rgba(255,255,255,0.03);
    color: var(--text-secondary);
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.5px;
  }
  .cell.past { background: var(--past-bg); color: var(--past); }
  .cell.present { background: var(--present-bg); color: var(--present); }
  .cell.future { background: var(--future-bg); color: var(--future); }
  .cell.future.bold { font-weight: 700; }

  /* Footer row */
  .footer-row {
    display: grid;
    grid-template-columns: 180px 1fr 1fr 1fr;
    gap: 8px;
    margin-top: 20px;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.4s ease;
  }
  .footer-row.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .footer-cell {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    text-align: center;
    padding: 8px;
  }
  .footer-cell.no-control { color: var(--text-tertiary); }
  .footer-cell.see-index { color: var(--present); opacity: 0.7; }

  /* ─── INDEX CARD SLIDE ─── */
  .index-slide-content {
    max-width: 540px;
    width: 100%;
  }
  .index-headline {
    font-size: 38px;
    font-weight: 700;
    letter-spacing: 3px;
    text-align: center;
    color: var(--text-primary);
    margin-bottom: 8px;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.5s ease;
  }
  .index-headline.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .index-box {
    margin-top: 28px;
    border: 1px solid rgba(240,107,106,0.3);
    border-radius: 8px;
    padding: 28px 24px;
    background: rgba(240,107,106,0.04);
  }
  .index-box-header {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 1px solid rgba(240,107,106,0.15);
    opacity: 0;
    transition: all 0.4s ease;
  }
  .index-box-header.visible { opacity: 1; }
  .index-col-label {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: var(--present);
    opacity: 0.7;
    text-align: center;
  }
  .index-pair-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 8px;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.4s ease;
  }
  .index-pair-row.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .index-pair-cell {
    background: rgba(240,107,106,0.08);
    border-radius: 5px;
    padding: 16px;
    text-align: center;
    font-size: 17px;
    font-weight: 600;
    color: var(--present);
  }
  .index-control-label {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-top: 24px;
    opacity: 0;
    transition: all 0.4s ease;
  }
  .index-control-label.visible { opacity: 1; }
  .index-control-label span {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--text-secondary);
  }
  .index-control-line {
    width: 50px;
    height: 1px;
    background: var(--text-tertiary);
  }
  .index-footer-note {
    text-align: center;
    font-size: 14px;
    color: var(--text-tertiary);
    margin-top: 24px;
    line-height: 1.6;
    opacity: 0;
    transition: all 0.4s ease;
  }
  .index-footer-note.visible { opacity: 1; }

  /* ─── NAV ─── */
  .nav-bar {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 12px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 40px;
    z-index: 50;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .nav-bar.visible { opacity: 1; }
  .nav-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--text-tertiary);
    cursor: pointer;
    transition: all 0.25s ease;
  }
  .nav-dot.active {
    background: var(--accent);
    transform: scale(1.3);
  }
  .nav-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    color: var(--text-secondary);
    background: none;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 18px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .nav-btn:hover {
    color: var(--text-primary);
    border-color: var(--text-secondary);
  }

  .tap-hint {
    position: fixed;
    bottom: 88px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-tertiary);
    letter-spacing: 1.5px;
    opacity: 0;
    transition: opacity 0.4s ease;
    z-index: 50;
  }
  .tap-hint.visible { opacity: 1; }

  /* ─── BRANDING FOOTER ─── */
  .brand-footer {
    position: fixed;
    bottom: 14px;
    right: 28px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    color: var(--text-tertiary);
    z-index: 40;
    display: none;
  }
  .brand-footer.visible { display: block; }
  .brand-footer a {
    color: var(--text-tertiary);
    text-decoration: none;
    transition: color 0.2s;
  }
  .brand-footer a:hover { color: var(--text-secondary); }
  /* ─── BRAIN DIAGRAM SLIDE ─── */
  .brain-layout {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 1100px;
    flex: 1;
    gap: 0;
  }
  .brain-views {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    position: relative;
  }
  .brain-svg-wrap {
    flex: 0 0 500px;
    height: 400px;
    position: relative;
  }
  /* Each brain layer is its own SVG group that reveals independently */
  .brain-layer {
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  .brain-layer.visible {
    opacity: 1;
  }
  .brain-info-cards {
    position: absolute;
    right: -20px;
    top: 0;
    bottom: 0;
    width: 380px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 12px;
  }
  .brain-info-card {
    padding: 18px 22px;
    border-radius: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    opacity: 0;
    transform: translateX(24px);
    transition: all 0.6s ease;
  }
  .brain-info-card.visible {
    opacity: 1;
    transform: translateX(0);
  }
  .brain-info-card.c-past { border-left: 3px solid var(--past); }
  .brain-info-card.c-present { border-left: 3px solid var(--present); }
  .brain-info-card.c-future { border-left: 3px solid var(--future); }
  .brain-info-title {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1.5px;
    margin-bottom: 2px;
  }
  .brain-info-card.c-past .brain-info-title { color: var(--past); }
  .brain-info-card.c-present .brain-info-title { color: var(--present); }
  .brain-info-card.c-future .brain-info-title { color: var(--future); }
  .brain-info-age {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-tertiary);
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }
  .brain-info-sub {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .brain-info-desc {
    font-size: 14px;
    color: var(--text-tertiary);
    line-height: 1.5;
  }
</style>
</head>
<body>

<div id="index-screen">
  <div class="index-title">WorkFit Templates</div>
  <div class="index-grid" id="index-grid"></div>
</div>

<div id="presentation">
  <div class="slide-track" id="slide-track"></div>
  <div class="tap-hint" id="tap-hint">TAP TO REVEAL</div>
  <div class="nav-bar" id="nav-bar">
    <button class="nav-btn" id="btn-index">INDEX</button>
    <div id="nav-dots" style="display:flex;gap:10px;align-items:center;"></div>
    <button class="nav-btn" id="btn-reset">RESET</button>
  </div>
</div>
<div class="brand-footer" id="brand-footer">Rob Maisey · <a href="https://sharezen.ca/workfit" target="_blank">WorkFit</a></div>

<script>
const DECKS = [
  {
    id: 'time-travel',
    title: 'Time Travel',
    subtitle: 'Past, present, future: how the brain controls the timeline',
    slides: [
      {
        number: '',
        title: 'THE BRAIN',
        subtitle: 'Three systems, one timeline',
        tagline: 'The oldest system wins unless you override it.',
        type: 'brain-diagram',
        regions: [
          { id: 'stem', label: 'BRAIN STEM', sub: 'Survival', desc: 'Breathing, heart rate, reflexes. Automatic. No conscious input required.', color: 'past' },
          { id: 'limbic', label: 'LIMBIC SYSTEM', sub: 'Emotion + Memory', desc: 'Fear, reward, bonding, memory storage. Runs the present. Decides before you do.', color: 'present' },
          { id: 'cortex', label: 'NEO CORTEX', sub: 'Thinking + Planning', desc: 'Language, reasoning, planning, impulse control. The newest system. Slowest to activate.', color: 'future' },
        ]
      },
      {
        number: '1',
        title: 'RECOGNITION',
        subtitle: 'Where the person is',
        tagline: 'You are always somewhere on this grid.',
        rows: [
          { theme: 'EXPERIENCE', past: 'Memories', present: 'Perception', future: 'Dreams' },
          { theme: 'BRAIN REGION', past: 'Stem / Limbic', present: 'Limbic', future: 'Neo Cortex' },
          { theme: 'MENTAL STATE', past: 'Depression', present: 'Addiction', future: 'Anxiety' },
          { theme: 'LANGUAGE', past: 'Novel', present: 'Script', future: 'Fantasy' },
        ]
      },
      {
        number: '2',
        title: 'MECHANISM',
        subtitle: 'How it works',
        tagline: 'Accountability asks what you will do, not what you did.',
        rows: [
          { theme: 'THINKING', past: 'Judgement', present: 'Decision', future: 'Choice' },
          { theme: 'OWNERSHIP', past: 'Blame', present: 'Responsibility', future: 'Accountability', futureBold: true },
          { theme: 'AGENCY', past: 'Beliefs', present: 'Power', future: 'Control' },
          { theme: 'STATE', past: 'Trauma', present: 'Habit', future: 'Will (limited)' },
        ]
      },
      {
        number: '3',
        title: 'OUTPUT',
        subtitle: 'Where it leads',
        tagline: 'We all make choices, including the choice to do nothing.',
        rows: [
          { theme: 'NAVIGATION', past: 'Rearview', present: 'Reaction', future: 'Direction' },
          { theme: 'STRATEGY', past: 'Hindsight', present: 'Adaptation', future: 'Plan' },
          { theme: 'MOVEMENT', past: 'Drift', present: 'Drive', future: 'Purpose' },
        ]
      },
      {
        number: 'INDEX',
        title: 'ADAPT OR ACCEPT',
        subtitle: '',
        type: 'index-card',
        closingLine: 'Both are choices. Neither is wrong. Only one creates change.',
        pairs: [
          ['COMFORT', 'DISCOMFORT'],
          ['INACTION', 'ACTION'],
          ['SAFETY', 'RISK'],
          ['FREEZE', 'MOVEMENT'],
          ['RESENTMENT', 'GRATITUDE'],
          ['VICTIM', 'AGENCY'],
        ]
      }
    ]
  },
];

let currentDeck = null, currentSlide = 0, revealStep = 0, totalSteps = 0;

function buildIndex() {
  const grid = document.getElementById('index-grid');
  grid.innerHTML = '';
  DECKS.forEach((deck, i) => {
    const card = document.createElement('div');
    card.className = 'index-card';
    card.innerHTML = `
      <div class="index-card-number">${String(i+1).padStart(2,'0')}</div>
      <div class="index-card-title">${deck.title}</div>
      <div class="index-card-sub">${deck.subtitle}</div>
      <div class="index-card-count">${deck.slides.length} cards</div>`;
    card.addEventListener('click', () => openDeck(deck));
    grid.appendChild(card);
  });
}

function openDeck(deck) {
  currentDeck = deck; currentSlide = 0; revealStep = 0;
  buildSlides(deck);
  document.getElementById('index-screen').classList.add('hidden');
  document.getElementById('presentation').classList.add('active');
  document.getElementById('brand-footer').classList.add('visible');
  setTimeout(() => {
    document.getElementById('nav-bar').classList.add('visible');
    revealCurrentSlide();
  }, 100);
}

function backToIndex() {
  document.getElementById('presentation').classList.remove('active');
  document.getElementById('nav-bar').classList.remove('visible');
  document.getElementById('tap-hint').classList.remove('visible');
  document.getElementById('brand-footer').classList.remove('visible');
  document.getElementById('index-screen').classList.remove('hidden');
  currentDeck = null;
}

function buildSlides(deck) {
  const track = document.getElementById('slide-track');
  track.innerHTML = ''; track.style.transform = 'translateX(0)';
  deck.slides.forEach((slide, si) => {
    const el = document.createElement('div');
    el.className = 'slide'; el.dataset.index = si;
    if (slide.type === 'index-card') el.innerHTML = buildIndexCardSlide(slide);
    else if (slide.type === 'brain-diagram') el.innerHTML = buildBrainSlide(slide);
    else el.innerHTML = buildGridSlide(slide);
    track.appendChild(el);
  });
  buildNavDots(deck.slides.length);
}

function buildBrainSlide(slide) {
  return `
    <div class="slide-header" data-reveal="header">
      <div class="slide-title">${slide.title}</div>
      <div class="slide-subtitle">${slide.subtitle}</div>
      ${slide.tagline ? `<div class="slide-tagline">${slide.tagline}</div>` : ''}
    </div>
    <div class="brain-layout">
      <div class="brain-views">
        <div class="brain-svg-wrap">
          <svg viewBox="0 0 480 400" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;">

            <!-- ══ LAYER 1: BRAIN STEM + SPINAL CORD (oldest) ══ -->
            <g class="brain-layer" data-reveal="layer-stem" data-reveal-group="stem">
              <!-- Spinal cord -->
              <path d="M218 340 Q215 320 216 300 Q217 285 220 270
                       M232 340 Q235 320 234 300 Q233 285 230 270"
                    fill="none" stroke="var(--past)" stroke-width="1.2" opacity="0.4"/>
              <!-- Brain stem - elongated, anatomical shape -->

function buildGridSlide(slide) {
  let html = `
    <div class="slide-header" data-reveal="header">
      <div class="slide-number">${slide.number} /</div>
      <div class="slide-title">${slide.title}</div>
      <div class="slide-subtitle">${slide.subtitle}</div>
      ${slide.tagline ? `<div class="slide-tagline">${slide.tagline}</div>` : ''}
    </div>
    <div class="grid-table">
      <div class="direction-row" data-reveal="directions">
        <div></div>
        <div class="direction-label left"><span>REGRESSION</span><div class="arrow-line"></div></div>
        <div></div>
        <div class="direction-label right"><div class="arrow-line"></div><span>PROGRESSION</span></div>
      </div>
      <div class="col-headers" data-reveal="colheaders">
        <div class="col-header theme">THEME</div>
        <div class="col-header past">PAST</div>
        <div class="col-header present">PRESENT</div>
        <div class="col-header future">FUTURE</div>
      </div>`;
  slide.rows.forEach((row, ri) => {
    const fb = row.futureBold ? ' bold' : '';
    html += `
      <div class="data-row" data-reveal="row-${ri}">
        <div class="cell theme">${row.theme}</div>
        <div class="cell past">${row.past}</div>
        <div class="cell present">${row.present}</div>
        <div class="cell future${fb}">${row.future}</div>
      </div>`;
  });
  html += `
      <div class="footer-row" data-reveal="footer">
        <div></div>
        <div class="footer-cell no-control">NO DIRECT CONTROL</div>
        <div class="footer-cell see-index">SEE INDEX</div>
        <div class="footer-cell no-control">NO DIRECT CONTROL</div>
      </div>
    </div>`;
  return html;
}

function buildIndexCardSlide(slide) {
  let ph = '';
  slide.pairs.forEach((p, pi) => {
    ph += `<div class="index-pair-row" data-reveal="pair-${pi}">
      <div class="index-pair-cell">${p[0]}</div>
      <div class="index-pair-cell">${p[1]}</div>
    </div>`;
  });
  return `
    <div class="index-slide-content">
      <div class="index-headline" data-reveal="headline">${slide.title}</div>
      <div class="slide-header" data-reveal="header" style="margin-bottom:20px">
        <div class="slide-number">INDEX /</div>
        <div class="slide-subtitle" style="font-size:15px;color:var(--present)">Present-State Binary</div>
        <div class="slide-subtitle" style="margin-top:4px">The limbic control point. Every row passes through here.</div>
      </div>
      <div class="index-box">
        <div class="index-box-header" data-reveal="box-header">
          <div class="index-col-label">LIMBIC DEFAULT</div>
          <div class="index-col-label">OVERRIDE</div>
        </div>
        ${ph}
      </div>
      <div class="index-control-label" data-reveal="control-label">
        <div class="index-control-line"></div>
        <span>CONTROL</span>
        <div class="index-control-line"></div>
      </div>
      <div class="index-footer-note" data-reveal="footer-note">
        Left column is where the limbic system keeps you.<br>Right column is where movement starts.
        ${slide.closingLine ? `<div class="slide-tagline" style="margin-top:16px;font-size:15px;">${slide.closingLine}</div>` : ''}
      </div>
    </div>`;
}

function buildNavDots(count) {
  const c = document.getElementById('nav-dots'); c.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const d = document.createElement('div');
    d.className = 'nav-dot' + (i===0?' active':'');
    d.addEventListener('click', () => goToSlide(i));
    c.appendChild(d);
  }
}
function updateNavDots() {
  document.querySelectorAll('.nav-dot').forEach((d,i) => d.classList.toggle('active', i===currentSlide));
}

function goToSlide(index) {
  if (!currentDeck || index<0 || index>=currentDeck.slides.length) return;
  currentSlide = index; revealStep = 0;
  document.getElementById('slide-track').style.transform = `translateX(-${index*100}vw)`;
  updateNavDots();
  const slide = document.getElementById('slide-track').children[index];
  slide.querySelectorAll('[data-reveal]').forEach(el => el.classList.remove('visible'));
  setTimeout(() => revealCurrentSlide(), 200);
}
function nextSlide() { goToSlide(currentSlide+1); }
function prevSlide() { goToSlide(currentSlide-1); }

function revealCurrentSlide() {
  const slide = document.getElementById('slide-track').children[currentSlide];
  // Build reveal steps: group elements by data-reveal-group, ungrouped are solo steps
  const els = slide.querySelectorAll('[data-reveal]');
  const steps = [];
  const grouped = new Set();
  els.forEach(el => {
    const group = el.getAttribute('data-reveal-group');
    if (group) {
      if (!grouped.has(group)) {
        grouped.add(group);
        steps.push(Array.from(slide.querySelectorAll(`[data-reveal-group="${group}"]`)));
      }
    } else {
      steps.push([el]);
    }
  });
  slide._revealSteps = steps;
  totalSteps = steps.length;
  revealStep = 0;
  if (totalSteps>0) document.getElementById('tap-hint').classList.add('visible');
  revealNext();
}

function revealNext() {
  const slide = document.getElementById('slide-track').children[currentSlide];
  const steps = slide._revealSteps;
  if (!steps || revealStep >= steps.length) { document.getElementById('tap-hint').classList.remove('visible'); return false; }
  steps[revealStep].forEach(el => el.classList.add('visible'));
  revealStep++;
  if (revealStep >= steps.length) document.getElementById('tap-hint').classList.remove('visible');
  return true;
}

function revealAll() {
  document.getElementById('slide-track').children[currentSlide].querySelectorAll('[data-reveal]').forEach(el => el.classList.add('visible'));
  revealStep = totalSteps;
  document.getElementById('tap-hint').classList.remove('visible');
}

function resetSlide() {
  document.getElementById('slide-track').children[currentSlide].querySelectorAll('[data-reveal]').forEach(el => el.classList.remove('visible'));
  revealStep = 0;
  document.getElementById('tap-hint').classList.add('visible');
  setTimeout(() => revealCurrentSlide(), 200);
}

// Events
document.getElementById('presentation').addEventListener('click', (e) => {
  if (e.target.closest('.nav-bar')||e.target.closest('.tap-hint')) return;
  if (revealStep>=totalSteps) nextSlide(); else revealNext();
});

let touchStartX=0, touchStartY=0, isSwiping=false;
document.getElementById('presentation').addEventListener('touchstart', (e) => {
  if (e.target.closest('.nav-bar')) return;
  touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY; isSwiping=false;
}, {passive:true});
document.getElementById('presentation').addEventListener('touchmove', (e) => {
  const dx=Math.abs(e.touches[0].clientX-touchStartX), dy=Math.abs(e.touches[0].clientY-touchStartY);
  if (dx>30&&dx>dy) isSwiping=true;
}, {passive:true});
document.getElementById('presentation').addEventListener('touchend', (e) => {
  if (!isSwiping||e.target.closest('.nav-bar')) return;
  const dx=e.changedTouches[0].clientX-touchStartX;
  if (dx<-50) nextSlide(); else if (dx>50) prevSlide();
}, {passive:true});

document.addEventListener('keydown', (e) => {
  if (!currentDeck) return;
  switch(e.key) {
    case 'ArrowRight': case ' ':
      e.preventDefault(); if (revealStep>=totalSteps) nextSlide(); else revealNext(); break;
    case 'ArrowLeft': e.preventDefault(); prevSlide(); break;
    case 'ArrowDown': e.preventDefault(); revealNext(); break;
    case 'ArrowUp': e.preventDefault(); resetSlide(); break;
    case 'Escape': e.preventDefault(); backToIndex(); break;
    case 'r': e.preventDefault(); resetSlide(); break;
    case 'a': e.preventDefault(); revealAll(); break;
  }
});

document.getElementById('btn-index').addEventListener('click', (e) => { e.stopPropagation(); backToIndex(); });
document.getElementById('btn-reset').addEventListener('click', (e) => { e.stopPropagation(); resetSlide(); });

buildIndex();
</script>
